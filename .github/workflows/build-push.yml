name: Build & Push

on:
  push:
    branches: [main, master, release/**]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG:-latest}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/trafficvision-backend:${{ steps.vars.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/trafficvision-backend:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push cv-pipeline
        uses: docker/build-push-action@v6
        with:
          context: ./cv-pipeline
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/trafficvision-cv-pipeline:${{ steps.vars.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/trafficvision-cv-pipeline:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/trafficvision-frontend:${{ steps.vars.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/trafficvision-frontend:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max